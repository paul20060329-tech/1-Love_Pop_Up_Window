<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Love Pop Up</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg" aria-hidden="true">
      <div class="blob b1"></div>
      <div class="blob b2"></div>
      <div class="blob b3"></div>
      <div class="noise"></div>
    </div>

    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">❤</div>
        <div class="brandText">
          <div class="brandTitle">Love Pop Up</div>
          <div class="brandSub">心形弹窗 · 轻盈 · 治愈</div>
        </div>
      </div>

      <div class="actions">
        <button class="btn primary" id="btnStart" type="button">开始</button>
        <button class="btn" id="btnClear" type="button">清空</button>
      </div>
    </header>

    <main class="stage" aria-label="弹窗舞台">
      <div class="hud">
        <div class="chip" id="chipStatus">就绪</div>
        <div class="chip">
          <span class="kbd">ESC</span>
          <span class="sep">·</span>
          停止并清空
        </div>
        <div class="chip">
          点击任意弹窗
          <span class="sep">·</span>
          关闭它
        </div>
      </div>
      <div id="layer" class="layer" role="presentation"></div>

      <section class="panel" aria-label="设置">
        <div class="panelTitle">设置</div>
        <div class="grid">
          <label class="field">
            <div class="label">心形数量</div>
            <input id="countHeart" type="number" min="1" max="600" step="1" value="180" />
          </label>
          <label class="field">
            <div class="label">随机数量</div>
            <input id="countRandom" type="number" min="0" max="600" step="1" value="160" />
          </label>
          <label class="field">
            <div class="label">速度 (ms)</div>
            <input id="intervalMs" type="number" min="10" max="200" step="1" value="25" />
          </label>
          <label class="field">
            <div class="label">自动消失 (ms)</div>
            <input id="ttlMs" type="number" min="0" max="20000" step="100" value="0" />
          </label>
        </div>
      </section>
    </main>

    <footer class="footer">
      <span>Made for you</span>
      <span class="dot">·</span>
      <span>基于原 Tkinter 弹窗逻辑复刻为 Web 动效</span>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
